name: Rebuild and deploy guide

# When to run:
#   - Every hour, on the hour (UTC) — picks up Google Docs edits automatically
#   - On any push to build.py, base.html, etc.
#   - Manually via the "Run workflow" button in the Actions tab
on:
  schedule:
    - cron: '0 * * * *'   # every hour at minute 0
  push:
    paths:
      - 'build.py'
      - 'base.html'
      - 'requirements.txt'
      - '.github/workflows/rebuild.yml'
  workflow_dispatch:

# contents: write  -> commit the rebuilt index.html back to the repo
# pages: write + id-token: write -> publish to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Standard GitHub Pages concurrency: one deploy at a time, never cancel a
# deploy that's mid-flight (cancelling can leave Pages in a broken state).
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # This environment is required for the Pages deploy action to work
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest docx and rebuild index.html
        run: python build.py

      - name: Commit refreshed docx and index.html if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add source/ index.html
          if git diff --staged --quiet; then
            echo "No content changes since last run."
          else
            git commit -m "chore: auto-rebuild from Google Docs"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
