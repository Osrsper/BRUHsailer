<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRUHsailer – OSRS Ironman Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ─── Variables ─── */
    :root {
      --bg:          #0e0b06;
      --bg-mid:      #1a1409;
      --bg-card:     #231a0c;
      --bg-card-hov: #2d2210;
      --border:      #3d2e14;
      --border-gold: #7a5c1e;
      --gold:        #c9a227;
      --gold-light:  #e8c85a;
      --gold-dim:    #8a6d1a;
      --green:       #4caf6e;
      --green-dim:   #2d6b43;
      --red:         #c04444;
      --text:        #e2ceaa;
      --text-dim:    #9a8060;
      --text-muted:  #5a4828;
      --complete:    #1a2e1f;
      --complete-border: #2a5c38;
      --radius:      6px;
      --sidebar-w:   260px;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 17px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-mid); }
    ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }

    /* ─── Header ─── */
    header {
      background: linear-gradient(135deg, #1a1106 0%, #0e0b06 50%, #1a1106 100%);
      border-bottom: 2px solid var(--border-gold);
      padding: 28px 32px 20px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 24px #000a;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header-title h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.06em;
      line-height: 1;
      text-shadow: 0 0 24px #c9a22740;
    }
    .header-title p {
      color: var(--text-dim);
      font-size: 0.88rem;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }
    .header-title span { color: var(--gold-dim); }

    /* Progress bar */
    .progress-wrap {
      flex: 1;
      max-width: 340px;
      min-width: 180px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 5px;
      font-family: 'Cinzel', serif;
    }
    .progress-label strong { color: var(--gold); }
    .progress-track {
      height: 12px;
      background: var(--bg-mid);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      border-radius: 6px;
      transition: width 0.5s ease;
      min-width: 0;
    }

    /* Header actions */
    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 6px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-gold);
      background: var(--bg-mid);
      color: var(--gold-light);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--border-gold); color: var(--bg); }
    .btn.danger { border-color: var(--red); color: var(--red); }
    .btn.danger:hover { background: var(--red); color: #fff; }

    /* ─── Layout ─── */
    .layout {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - var(--header-h, 120px));
    }

    /* ─── Sidebar ─── */
    aside {
      width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: var(--header-h, 120px);
      height: calc(100vh - var(--header-h, 120px));
      overflow-y: auto;
      padding: 24px 0;
      border-right: 1px solid var(--border);
    }
    .sidebar-section {
      margin-bottom: 8px;
    }
    .sidebar-chapter {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold-dim);
      padding: 8px 20px 4px;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px;
      font-size: 0.87rem;
      color: var(--text-dim);
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    .sidebar-link:hover {
      color: var(--text);
      background: var(--bg-card);
      border-left-color: var(--border-gold);
    }
    .sidebar-link.active {
      color: var(--gold-light);
      background: var(--bg-card);
      border-left-color: var(--gold);
    }
    .sidebar-link .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 1.5px solid var(--text-muted);
      flex-shrink: 0;
    }
    .sidebar-link.done .dot {
      background: var(--green);
      border-color: var(--green);
    }
    .sidebar-progress {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 20px;
    }

    /* ─── Main ─── */
    main {
      flex: 1;
      padding: 28px 32px;
      min-width: 0;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--border-gold); color: var(--text); }
    .filter-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }
    .filter-count {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-left: 4px;
    }
    .filter-spacer { flex: 1; }

    /* ─── Chapter heading ─── */
    .chapter-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 36px 0 20px;
      scroll-margin-top: 130px;
    }
    .chapter-heading:first-of-type { margin-top: 0; }
    .chapter-heading h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.06em;
    }
    .chapter-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-gold), transparent);
    }
    .chapter-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid var(--border-gold);
      color: var(--gold-dim);
      white-space: nowrap;
    }

    /* Section heading — collapsible */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
      margin: 24px 0 0;
      padding: 10px 14px;
      background: #0f1a10;
      border: 1px solid var(--green-dim);
      border-radius: var(--radius);
      cursor: pointer;
      user-select: none;
      scroll-margin-top: 130px;
      transition: background 0.15s, border-color 0.15s;
    }
    .section-heading:hover { background: #142016; border-color: var(--green); }
    .section-heading .sec-chevron {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--green-dim);
      transition: transform 0.2s;
    }
    .section-heading.open .sec-chevron { transform: rotate(180deg); }
    .section-heading .sec-count {
      font-size: 0.7rem;
      color: var(--green-dim);
      font-weight: 400;
      letter-spacing: 0;
    }

    .section-body {
      display: none;
      margin-bottom: 10px;
      padding-top: 10px;
    }
    .section-body.open {
      display: block;
    }

    /* Main action bullet list (sentence-split from guide text) */
    .step-body ul.main-steps {
      margin: 10px 0 8px 0;
      padding-left: 18px;
    }
    .step-body ul.main-steps > li {
      margin-bottom: 6px;
      color: var(--text);
      font-size: 0.95rem;
    }
    .step-body ul.main-steps > li::marker { color: var(--gold); }

    /* Sub-notes (indented hints/tips from original guide) */
    .step-body ul.sub-notes {
      margin: 8px 0 8px 0;
      padding-left: 18px;
      border-left: 2px solid var(--border-gold);
      margin-left: 4px;
    }
    .step-body ul.sub-notes > li {
      margin-bottom: 5px;
      color: var(--text-dim);
      font-size: 0.88rem;
      font-style: italic;
    }
    .step-body ul.sub-notes > li::marker { color: var(--gold-dim); }
    .step-body ul.sub-notes ul { padding-left: 16px; margin-top: 4px; }
    .step-body ul.sub-notes ul li { font-size: 0.85rem; }

    /* ─── Step Card ─── */
    .step-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }
    .step-card:hover { border-color: var(--border-gold); }
    .step-card.completed {
      background: var(--complete);
      border-color: var(--complete-border);
      opacity: 0.75;
    }
    .step-card.completed:hover { opacity: 1; border-color: var(--green-dim); }
    .step-card.highlighted { border-color: var(--gold); }

    .step-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
    }
    .step-checkbox {
      width: 20px; height: 20px;
      border: 2px solid var(--border-gold);
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      cursor: pointer;
    }
    .step-card.completed .step-checkbox {
      background: var(--green);
      border-color: var(--green);
    }
    .step-checkbox::after {
      content: '';
      width: 6px; height: 10px;
      border: 2px solid #fff;
      border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
      opacity: 0;
      transition: opacity 0.1s;
    }
    .step-card.completed .step-checkbox::after { opacity: 1; }

    .step-num {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: var(--text-muted);
      flex-shrink: 0;
      width: 32px;
      margin-top: 3px;
    }
    .step-summary {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      word-break: break-word;
    }
    .step-card.completed .step-summary { color: var(--text-dim); }

    .step-tags {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 5px;
    }
    .tag {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 3px;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.03em;
    }
    .tag-skill { background: #1a2e1a; color: #6cbd82; border: 1px solid #2d5c35; }
    .tag-quest { background: #1a1a2e; color: #7070d4; border: 1px solid #2d2d5c; }
    .tag-item  { background: #2e1a1a; color: #cd7070; border: 1px solid #5c2d2d; }
    .tag-tip   { background: #2e2a1a; color: #c9a227; border: 1px solid #5c4c1a; }

    .step-chevron {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 2px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .step-card.open .step-chevron { transform: rotate(180deg); }

    /* Step body */
    .step-body {
      display: none;
      padding: 0 16px 16px 60px;
      border-top: 1px solid var(--border);
    }
    .step-card.open .step-body { display: block; }

    .step-body p {
      margin-bottom: 8px;
      color: var(--text-dim);
      font-size: 0.95rem;
    }
    /* legacy ul/ol (for hand-authored content) */
    .step-body ul:not(.main-steps):not(.sub-notes),
    .step-body ol {
      margin: 6px 0 12px 0;
      padding-left: 20px;
    }
    .step-body li {
      margin-bottom: 4px;
      color: var(--text-dim);
      font-size: 0.95rem;
    }
    .step-body li::marker { color: var(--gold-dim); }
    .step-body strong { color: var(--text); font-weight: 600; }
    .step-body em { color: var(--gold-light); font-style: italic; }

    /* Callout boxes */
    .callout {
      margin: 10px 0;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }
    .callout-tip {
      background: #2a2210;
      border-left: 3px solid var(--gold);
      color: var(--text-dim);
    }
    .callout-tip::before { content: '💡 '; }
    .callout-warning {
      background: #2a1515;
      border-left: 3px solid var(--red);
      color: var(--text-dim);
    }
    .callout-warning::before { content: '⚠️ '; }
    .callout-note {
      background: #151e15;
      border-left: 3px solid var(--green-dim);
      color: var(--text-dim);
    }
    .callout-note::before { content: '📝 '; }

    /* Sub-section within step body */
    .step-subsection {
      margin-top: 12px;
    }
    .step-subsection h4 {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* Step meta info box */
    .step-meta {
      margin-top: 12px;
      padding: 8px 12px;
      background: #1a1409;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.85rem;
      color: var(--text-dim);
      line-height: 1.8;
    }
    .step-meta strong { color: var(--text); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* Highlight btn */
    .step-highlight-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 4px;
      margin-top: 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .step-highlight-btn:hover, .step-card.highlighted .step-highlight-btn { color: var(--gold); }

    /* ─── Decorative corner ─── */
    header::before, header::after {
      content: '⬟';
      font-size: 0.7rem;
      color: var(--border-gold);
      position: absolute;
      top: 10px;
    }
    header::before { left: 10px; }
    header::after  { right: 10px; }
    header { position: sticky; }

    /* ─── Mobile ─── */
    @media (max-width: 760px) {
      aside { display: none; }
      main { padding: 16px; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .progress-wrap { max-width: 100%; width: 100%; }
    }

    /* ─── Search ─── */
    .search-wrap {
      display: flex;
      align-items: center;
      background: #0e0b06;
      border: 1px solid var(--border-gold);
      border-radius: 20px;
      padding: 5px 12px;
      gap: 6px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .search-wrap:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px #c9a22730;
    }
    .search-icon { font-size: 0.82rem; opacity: 0.5; }
    .search-input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 0.88rem;
      width: 180px;
      caret-color: var(--gold);
    }
    .search-input::placeholder { color: var(--text-muted); font-size: 0.82rem; }
    .search-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.72rem;
      padding: 0 2px;
      display: none;
      line-height: 1;
    }
    .search-clear:hover { color: var(--gold); }
    .search-wrap.has-value .search-clear { display: block; }

    .search-banner {
      margin-bottom: 16px;
      padding: 8px 14px;
      background: #1a1409;
      border: 1px solid var(--border-gold);
      border-radius: var(--radius);
      font-size: 0.88rem;
      color: var(--gold-dim);
    }
    .search-banner strong { color: var(--gold); }

    /* Highlight matching text */
    mark {
      background: #c9a22740;
      color: var(--gold-light);
      border-radius: 2px;
      padding: 0 2px;
    }

  </style>
</head>
<body>

<!-- ─── Header ─── -->
<header>
  <div class="header-inner">
    <div class="header-title">
      <h1>⚔ BRUHsailer</h1>
      <p>Ironman guide by <span>So Iron BRUH</span> &amp; <span>ParasailerOSRS</span></p>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Overall Progress</span>
        <strong id="progressText">0 / 0</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn" id="jumpBtn">↓ Jump to Last</button>
      <button class="btn" id="collapseBtn">Collapse Done</button>
      <button class="btn" id="clearHighlightsBtn">Clear Highlights</button>
      <button class="btn danger" id="resetBtn">Reset Progress</button>
      <div style="width:16px"></div>
      <div class="search-wrap">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search steps…" autocomplete="off" />
        <button class="search-clear" id="searchClear" title="Clear">&#10005;</button>
      </div>
    </div>
  </div>
</header>

<!-- ─── Layout ─── -->
<div class="layout">

  <!-- Sidebar -->
  <aside id="sidebar"></aside>

  <!-- Main -->
  <main>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All <span class="filter-count" id="countAll"></span></button>
      <button class="filter-btn" data-filter="incomplete">Incomplete <span class="filter-count" id="countIncomplete"></span></button>
      <button class="filter-btn" data-filter="complete">Completed <span class="filter-count" id="countComplete"></span></button>
    </div>
    <div id="searchBanner" class="search-banner" style="display:none"></div>
    <div id="guideContent"></div>
  </main>
</div>

<script>
// ─── Guide Data ───────────────────────────────────────────────
const GUIDE = [
  {
    chapter: "Chapter 1",
    chapterDesc: "Account creation → Earth Battlestaves",
    sections: [
      {
        id: "s1-1",
        name: "1.1 \u2013 Tutorial Island & Wintertodt",
        steps: [
          {
            id: "1-1",
            title: `Step 1: Choose a swag look for your account (older guides will mention that you need to start as a female character - this is no longer required)`,
            tags: [],
            content: `<ul class="main-steps"><li>Choose a swag look for your account (older guides will mention that you need to start as a female character - this is no longer required)</li><li>Make sure you have two step authenticator enabled</li><li>For most of the guide it is assumed you carry your GP stack</li><li>All lamps, unless mentioned otherwise, go on Herblore until the end of Chapter 2 (Song Of The Elves completed)</li><li>Grab a knife, jug and fill it with water, 2 buckets (hop once), cabbage, leather boots</li><li>Talk to Duke Horacio to start Rune Mysteries, burn logs to 15 firemaking, bank 5 ashes</li><li>Grab 110 logs and bank them.</li></ul>
<div class="step-meta">💰 <strong>GP after step:</strong> 25 gp<br>🎒 <strong>Items needed:</strong> none<br>⏱ <strong>Total time:</strong> 35 minutes</div>`,
          },
          {
            id: "1-2",
            title: `Step 2: Grab coins, a knife, 24 logs, your mind and air runes`,

ave around more 20 logs for future uses.</li><li>30 construction (more is better, 30 is essential)</li><li>2 iron ore</li><li>1 silver ore</li><li>1 grimy ranarr weed</li><li>3 willow seeds</li><li>15 harralander seeds (or more lower tier herb seeds for similar xp)</li><li>~200 pure essence</li><li>A raw swordfish (you can get this from tempoross later).</li><li>Some silver and gold ore (~50 silver, ~100 gold is sufficient, more is better. If you don’t get enough you may have to buy some at the blast furnace later).</li><li>Some fletching levels along the way (the guide will assume level 31, 15,500 xp, after this step, if you are over/under you can adjust your future plans for making steel arrows to 46 fletching accordingly).</li><li>Optionally: do a small group kill on a separate world for 3000 or more points in one game for the Combat Achievement.</li><li>Quite a few people worry about minmaxing the loot. It doesn’t matter that much, training skills up for better loot is not worth it. The optimal way to open reward carts is:<ul><li>Wait until 60 woodcutting to open any rewards. If you are not staying at todt until 60wc instead open them as late as possible (when you leave todt). If you do wait until 60wc, open all but 30-50 of them.</li><li>If you have remaining reward cart pulls after the above step, wait until you have completed the Digsite quest to open the rest.</li><li>Do not wait for other levels (herblore, farming, etc.) with collecting the rewards. If you have more rewards then collect them as soon as you can use the loot. In particular, do not wait for ‘breakpoints’ in levels to increase your loot, just open them for money to reduce time spent blackjacking. You can optionally decide to wait for completion of step 93 (tithe farming) to increase the seed yield, but this is not best.</li></ul></li><li>After opening all of the rewards, we assume that you have exactly 128k GP as a baseline, as well as the money for 46 fletching. HCIM will need a bit more (get he Varrock medium diary step. Make sure to plant at least one in Catherby for the diary)</li><li>Whiteberries (in either the Champions’ Guild, the Farming Guild patch or the Ardougne Monastery patch).</li><li>Two toadflax for agility potions (for Tai Bwo Wannai Trio and Making Friends with My Arm).</li><li>On one of your (future) herb runs plant strawberries in Ardougne for the diary (both patches recommended).</li><li>You will need some prayer potions soon, so make sure to plant a set of ranarrs and snape grass early as well.</li><li>Plant watermelons to harvestfill for making more compost.</li><li>Growing harralanders for making energy potions is very reasonable, and they will come in handy.</li><li>Grow at least 20 nightshade for the Seren fight in Song of the Elves. You won’t need this for a long time, but you may as well grow them early! If you worry you might not one-shot the fight, get 30-40 of them instead.</li><li>Note: until you get to Chapter 2, Step 66 you will be stuck with ‘amateur’ herb runs as the best herb run option. It is recommended to postpone herb runs until that step, while maintaining farming contracts and other hourlies. If you find you need herblore levels, potions or want to do herb runs anyway, check the farming guide linked below and ignore patches that are difficult to reach (on the Arceuus spellbook), doing runs with fewer patches instead. This means, for example, only visiting the Falador farming patch as many times per day as you have explorer’s ring teleports. Until Chapter 2, Step 66 all mentions of herb runs refer to optional, low efficiency herb runs.</li></ul></li><li>When you get palm tree seeds, make sure to plant your first in Brimhaven and second outside the Tree Gnome Village.</li><li>When you get yew tree seeds, make sure to plant one in Varrock after level 68 farming and 60 woodcutting, to dig up for two yew roots for the diary.</li><li>Based on our estimates you will need to complete around 200-250 farming contracts (starting with medium, downgrading if you roll something slow) to bank the herbs for level 70 using Barblore later. Even if you aren’t ready to farm the herbs yet it is worth collecting the seeds.</li><li>If you are asked to complete a contract that you would like to do but for which you don’t have the seeds it is worth to pickpocket master farmers for a bit (for example in Draynor or north of Ardougne) to get it. The loot scales with your farming level (and the failure chance with your thieving level), but according to this Mod Ash tweet the farming scaling only has an impact on the ranarr, snapdragon and torstol rates so the other seeds are fine. https://twitter.com/JagexAsh/status/1400868684474765314</li><li>Save 6 spirit tree seeds to plant across the world and in your POH (also keep in mind that they can get diseased and die while growing), trade all others in for t5 farming contracts.</li><li>Once you hit level 85 (boostable) farming you can plant Celastrus saplings, and harvest them for bark which makes battlestaves. If you want a bit more leeway with GP you can harvest and replant these at the end of the day/when you won’t be doing farming contracts for the next 13 hours or so even if you’re not on a contract. You should typically have a ton of seeds by the time you can plant them. If you are ever low on money you can alch the staves from celastrus harvests ‘raw’, or blow and charge more orbs for them.<ul><li>This is particularly relevant for HCIM, who might chicken out of wish to avoid killing green dragons in the wilderness later and then lack green d’hide bodies gp.</li></ul></li><li>Once you hit level 58 herblore, go back to Tithe farm to buy the herb sack.</li><li>The best method to do Tithe farming at this level is 25x4 Half-Replant Gricoller's Tithe Farm! Fastest XP (~120k xp/hr)but using regular watering cans - no need to buy Gricoller’s can. Also you can left click to water the plants, it is not necessary to manual click water except on the first lap, immediately after planting. This may use energy potions at your agility level, despite the agility rework making it much more doable. As an alternative there is 20x5: Tithe Farm Updated (100 fruits in 19min 24sec - No Stams/Energy potions).</li><li>You can find a complete farming guide here: 20220622FarmingGuide. It is more accurate and complete than the farming advice scattered throughout BRUHsailer. Please use this to plan your farming methods going forward. This guide also has videos and resources on tithe farming.</li></ul>

            content: `<ul class="main-steps"><li>You should be level 51 (or higher) slayer</li><li>Make sure you have finished the Curse of the Empty Lord miniquest (if you haven’t, do it now, putting the lamp on slayer)</li><li>Teleport to Varrock, make sure to grab the Dragon’hai history book from the Varrock Palace library if you don’t already have it, pray at the altar in the palace with smite active</li><li>Buy 20,000 air runes (if you already have these you can ignore this), then run through  the east gate to the quetzal to go to Varlamore and do At First Light (note: the hunter rumours are currently not efficient, but if you want the rewards you can go for them at any time after this quest)</li><li>During At First Light catch a Sunlight antelope (east end of the island, requires level 72 hunter, a teasing stick, knife and logs - grab a Trapper’s tipple or two at the hunter’s guild for a +2 boost if needed) and kill a jaguar for their fur</li><li>At the hunter’s guild buy two mixed hide bases, and either pay Pellem to have the furs made into mixed hide boots (your best ranged boots for now) and a mixed hide cape (your best melee cape for now) or boost your crafting level if you have a spare mushroom pie to do it yourself</li><li>After this start and complete Perilous Moons (for the fights your dragon scimitar is fine, even for ice</li><li>Use the moss lizards and moonlight potions for supplies) and The Heart of Darkness</li><li>At the end of the quest travel to Tal Teklan (e.g. with the quetzal system)</li><li>Buy four willow longbows at Arcuani’s Archery Supplies</li><li>If you haven’t done Scrambled! yet, do it now</li><li>Travel to Auburnvale (e.g. using the boat system)</li><li>Start and complete Shadows of Custodia</li><li>Teleport out</li><li>Slay a Brine rat to complete the Fremennik medium diary, putting the lamp on herblore</li><li>Grab a rope, salve teleport, dip your enchanted silvthrill rod in the well to make the Rod of Ivandis and complete In Aid of the Myreque, Darkness of Hallowvale, A Taste of Hope and Sins of the Father (all lamps on herblore)</li><li>Use the Efaritay’s aid during the Vanstrom Klause fight in Sins of the Father - you should only need one ring, the second is spare in case you die or run out of charges.</li></ul>
<ul class="sub-notes"><li>We will continue lamping slayer to level 58 for access to Cave Horrors (mind the quest xp still coming up, about 30k total from here), and after that put all lamps on herblore instead. You may choose to lamp more/less slayer depending on personal preference. There is more than enough lamp xp.</li></ul>`,

o longer recommended!). If you are missing any of these tasks by the time you reach 100cb, go do them (stew boosting slayer as necessary). Collect the easy and medium Combat Achievement rewards, lamping herblore.<ul><li>Complete His Faithful Servants along the way.</li></ul></li></ul>

const STORAGE_KEY = 'bruhsailer_progress';
let completed = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let highlighted = new Set();
let currentFilter = 'all';
let collapseCompleted = false;

// ─── DOM references ───────────────────────────────────────────
const guideContent   = document.getElementById('guideContent');
const sidebar        = document.getElementById('sidebar');
const progressFill   = document.getElementById('progressFill');
const progressText   = document.getElementById('progressText');
const countAll       = document.getElementById('countAll');
const countComplete  = document.getElementById('countComplete');
const countIncomplete= document.getElementById('countIncomplete');

// ─── Helpers ──────────────────────────────────────────────────
function allStepIds() {
  return GUIDE.flatMap(ch => ch.sections.flatMap(s => s.steps.map(st => st.id)));
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed]));
}
function updateProgress() {
  const all = allStepIds();
  const done = all.filter(id => completed.has(id)).length;
  const pct = all.length ? Math.round((done / all.length) * 100) : 0;
  progressFill.style.width = pct + '%';
  progressText.textContent = `${done} / ${all.length}`;
  countAll.textContent = all.length;
  countComplete.textContent = done;
  countIncomplete.textContent = all.length - done;
}

    label.className = 'sidebar-chapter';
    label.textContent = ch.chapter;

    ch.sections.forEach(sec => {

      const done  = sec.steps.filter(s => completed.has(s.id)).length;
      const a = document.createElement('a');
      a.className = 'sidebar-link' + (done === total ? ' done' : '');
      a.href = '#' + sec.id;
      a.innerHTML = `<span class="dot"></span>${sec.name}<span class="sidebar-progress">${done}/${total}</span>`;
      wrap.appendChild(a);
    });
    const div = document.createElement('div');
    div.className = 'sidebar-divider';
    wrap.appendChild(div);
    sidebar.appendChild(wrap);
  });
}

// ─── Section collapse state ──────────────────────────────────
const collapsedSections = new Set();

// ─── Render ───────────────────────────────────────────────────
function renderGuide() {
  guideContent.innerHTML = '';
  let anyVisible = false;

  GUIDE.forEach(ch => {
    // Chapter heading
    const chEl = document.createElement('div');
    chEl.className = 'chapter-heading';
    chEl.innerHTML = `<h2>⚔ ${ch.chapter}</h2><div class="chapter-line"></div><span class="chapter-badge">${ch.chapterDesc}</span>`;
    guideContent.appendChild(chEl);

    ch.sections.forEach(sec => {
      const stepsInFilter = sec.steps.filter(s => {
        if (currentFilter === 'complete')   return completed.has(s.id);
        if (currentFilter === 'incomplete') return !completed.has(s.id);
        return true;
      });
      if (stepsInFilter.length === 0) return;
      anyVisible = true;

      const isSecOpen = !collapsedSections.has(sec.id);
      const doneCount = sec.steps.filter(s => completed.has(s.id)).length;

      // Section heading (clickable)
      const secEl = document.createElement('div');
      secEl.className = 'section-heading' + (isSecOpen ? ' open' : '');
      secEl.id = sec.id;
      secEl.innerHTML = `
        <span>${sec.name}</span>
        <span class="sec-count">${doneCount} / ${stepsInFilter.length} done</span>
        <span class="sec-chevron">▼</span>
      `;
      secEl.addEventListener('click', () => {
        if (collapsedSections.has(sec.id)) collapsedSections.delete(sec.id);
        else collapsedSections.add(sec.id);
        renderGuide();
      });
      guideContent.appendChild(secEl);

      // Section body (collapsible)
      const secBody = document.createElement('div');
      secBody.className = 'section-body' + (isSecOpen ? ' open' : '');

      stepsInFilter.forEach((step) => {
        const isCompleted   = completed.has(step.id);
        const isHighlighted = highlighted.has(step.id);

        const card = document.createElement('div');
        card.className = 'step-card' +
          (isCompleted   ? ' completed'   : '') +
          (isHighlighted ? ' highlighted' : '');
        card.dataset.id = step.id;

        const tagHTML = step.tags.map(t =>
          `<span class="tag ${t.cls}">${t.label}</span>`
        ).join('');

        card.innerHTML = `
          <div class="step-header">
            <div class="step-checkbox" title="Mark complete"></div>
            <span class="step-num">#${step.id}</span>
            <div style="flex:1;min-width:0">
              <div class="step-summary">${step.title}</div>
              ${tagHTML ? `<div class="step-tags">${tagHTML}</div>` : ''}
            </div>
            <button class="step-highlight-btn" title="Highlight step">★</button>
            <span class="step-chevron">▼</span>
          </div>
          <div class="step-body">${step.content}</div>
        `;

        secBody.appendChild(card);
      });

      guideContent.appendChild(secBody);
    });
  });

  if (!anyVisible) {
    guideContent.innerHTML += `<div class="empty-state">No steps match the current filter.</div>`;
  }

  updateProgress();
  updateSidebar();
}

// ─── Event delegation for step cards ─────────────────────────
guideContent.addEventListener('click', e => {
  const card = e.target.closest('.step-card');
  if (!card) return;
  const id = card.dataset.id;

  // Checkbox click
  if (e.target.closest('.step-checkbox')) {
    if (completed.has(id)) completed.delete(id);
    else completed.add(id);
    save();
    renderGuide();
    updateProgress();
    updateSidebar();
    return;
  }

  // Highlight button click
  if (e.target.closest('.step-highlight-btn')) {
    if (highlighted.has(id)) highlighted.delete(id);
    else highlighted.add(id);
    renderGuide();
    return;
  }

  // Header click (expand/collapse)
  if (e.target.closest('.step-header')) {
    card.classList.toggle('open');
  }
});

// ─── Button handlers ──────────────────────────────────────────
document.getElementById('jumpBtn').addEventListener('click', () => {
  const ids = allStepIds();
  let lastId = null;
  for (const id of ids) {
    if (completed.has(id)) lastId = id;
  }
  if (!lastId) return;
  // find first incomplete after last completed
  const nextIdx = ids.indexOf(lastId) + 1;
  const nextId  = ids[nextIdx];
  if (nextId) {
    const card = document.querySelector(`.step-card[data-id="${nextId}"]`);
    if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); card.classList.add('open'); }
  }
});

document.getElementById('collapseBtn').addEventListener('click', function() {
  collapseCompleted = !collapseCompleted;
  this.textContent = collapseCompleted ? 'Expand Done' : 'Collapse Done';
  renderGuide();
});

document.getElementById('clearHighlightsBtn').addEventListener('click', () => {
  highlighted.clear();
  renderGuide();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all progress? This cannot be undone.')) {
    completed.clear();
    save();
    renderGuide();
    updateProgress();
    updateSidebar();
  }
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentFilter = this.dataset.filter;
    renderGuide();
  });
});


// ─── Sync sidebar top to actual header height ─────────────────
function syncHeaderHeight() {
  const h = document.querySelector('header').offsetHeight;
  document.documentElement.style.setProperty('--header-h', h + 'px');
}
syncHeaderHeight();
window.addEventListener('resize', syncHeaderHeight);

// ─── Init ─────────────────────────────────────────────────────
renderGuide();

// ─── Search ───────────────────────────────────────────────────
let searchQuery = '';

const searchInput  = document.getElementById('searchInput');
const searchClear  = document.getElementById('searchClear');
const searchBanner = document.getElementById('searchBanner');

function stripHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || '';
}

function highlightText(html, query) {
  if (!query) return html;
  // Escape regex special chars
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(`(${escaped})`, 'gi');
  // Only highlight in text nodes — operate on the raw HTML string but skip tags
  return html.replace(/>([^<]+)</g, (match, text) => {
    return '>' + text.replace(re, '<mark>$1</mark>') + '<';
  });
}

function stepMatchesSearch(step, query) {
  if (!query) return true;
  const q = query.toLowerCase();
  const titleText = step.title.toLowerCase();
  const contentText = stripHTML(step.content).toLowerCase();
  return titleText.includes(q) || contentText.includes(q);
}

function renderSearch() {
  guideContent.innerHTML = '';
  const query = searchQuery.trim();

  if (!query) {
    searchBanner.style.display = 'none';
    renderGuide();
    return;
  }

  let totalMatches = 0;

  GUIDE.forEach(ch => {
    let chapterHasMatches = false;

    ch.sections.forEach(sec => {
      const matchingSteps = sec.steps.filter(s => stepMatchesSearch(s, query));
      if (matchingSteps.length === 0) return;

      if (!chapterHasMatches) {
        const chEl = document.createElement('div');
        chEl.className = 'chapter-heading';
        chEl.innerHTML = `<h2>⚔ ${ch.chapter}</h2><div class="chapter-line"></div><span class="chapter-badge">${ch.chapterDesc}</span>`;
        guideContent.appendChild(chEl);
        chapterHasMatches = true;
      }

      // Section label (not collapsible in search mode)
      const secEl = document.createElement('div');
      secEl.className = 'section-heading open';
      secEl.style.cursor = 'default';
      secEl.innerHTML = `<span>${sec.name}</span><span class="sec-count">${matchingSteps.length} match${matchingSteps.length !== 1 ? 'es' : ''}</span>`;
      guideContent.appendChild(secEl);

      const secBody = document.createElement('div');
      secBody.className = 'section-body open';

      matchingSteps.forEach(step => {
        totalMatches++;
        const isCompleted   = completed.has(step.id);
        const isHighlighted = highlighted.has(step.id);

        const card = document.createElement('div');
        card.className = 'step-card open' +
          (isCompleted   ? ' completed'   : '') +
          (isHighlighted ? ' highlighted' : '');
        card.dataset.id = step.id;

        const hiTitle   = highlightText(step.title, query);
        const hiContent = highlightText(step.content, query);

        card.innerHTML = `
          <div class="step-header">
            <div class="step-checkbox" title="Mark complete"></div>
            <span class="step-num">#${step.id}</span>
            <div style="flex:1;min-width:0">
              <div class="step-summary">${hiTitle}</div>
            </div>
            <button class="step-highlight-btn" title="Highlight step">&#9733;</button>
            <span class="step-chevron" style="transform:rotate(180deg)">&#9660;</span>
          </div>
          <div class="step-body">${hiContent}</div>
        `;

        secBody.appendChild(card);
      });

      guideContent.appendChild(secBody);
    });
  });

  // Banner
  if (totalMatches === 0) {
    searchBanner.innerHTML = `No steps found for <strong>"${query}"</strong>`;
    guideContent.innerHTML = '<div class="empty-state">No steps match your search.</div>';
  } else {
    searchBanner.innerHTML = `Found <strong>${totalMatches}</strong> step${totalMatches !== 1 ? 's' : ''} matching <strong>"${query}"</strong>`;
  }
  searchBanner.style.display = 'block';
}

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value;
  const wrap = searchInput.closest('.search-wrap');
  wrap.classList.toggle('has-value', !!searchQuery.trim());
  renderSearch();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  searchInput.closest('.search-wrap').classList.remove('has-value');
  searchBanner.style.display = 'none';
  renderGuide();
  searchInput.focus();
});

// Keyboard shortcut: / to focus search
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
  if (e.key === 'Escape' && document.activeElement === searchInput) {
    searchInput.blur();
  }
});

</script>
